name: sdr
description: Hermes SDR — prospection Nextmotion

services:
  monday:
    boards: [8379500363]
    commands:
      - leads.list
      - leads.get
      - leads.update
      - leads.note
      - leads.next-actions
    column_map:
      status: lead_status
      phone: lead_phone
      email: lead_email
      company: lead_company
      last_contact: date_mkqz4d3e
      first_name: first_name
      last_name: last_name
    allowed_statuses:
      - New
      - MQL
      - Working
      - Sequence
      - No response
      - Patient
      - not interested - budget
      - not interested - competitor
      - not interested - no answer
      - Non pertinent (pas d'esthetique)

  nextcall:
    commands:
      - contact.get
      - contact.history
      - send.whatsapp
      - send.sms
      - send.email
      - calendar.check
      - calendar.book
    limits:
      whatsapp: 20
      sms: 10
      emails: 15
    max_message_length: 500

  elevenlabs:
    commands:
      - call.trigger
      - call.result
      - call.list-today
    limits:
      calls: 10
